<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontline Dev-Group | Official Site</title>
    <style>
        /* Глубокий чёрно-фиолетовый космический фон */
        body {
            background: radial-gradient(circle at top, #1c103a 0%, #0b0716 70%, #05030a 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Наша сочная аватарка века с неоновым фиолетовым свечением */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px solid rgba(168, 85, 247, 0.4);
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.6);
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .profile-img:hover {
            transform: scale(1.05);
        }

        h1 {
            margin: 25px 0 5px 0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
        }

        .sub-title {
            color: #a855f7;
            margin: 0 0 40px 0;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* Стиль Liquid Glass (Жидкое глянцевое стекло iPhone) */
        .link-btn {
            width: 100%;
            max-width: 340px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.03) 100%);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.3); /* Глянцевый блик сверху */
            border-radius: 16px;
            padding: 16px;
            margin: 12px 0;
            text-align: center;
            text-decoration: none;
            color: #f3e8ff;
            font-weight: 600;
            font-size: 16px;
            backdrop-filter: blur(20px); /* Сильное размытие жидкого стекла */
            -webkit-backdrop-filter: blur(20px);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 8px 32px 0 rgba(5, 3, 10, 0.4), 
                        inset 0 1px 0 0 rgba(255, 255, 255, 0.1);
        }

        /* Эффект касания и неонового взрыва при наведении */
        .link-btn:hover {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.3) 0%, rgba(168, 85, 247, 0.1) 100%);
            border-color: rgba(168, 85, 247, 0.8);
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 40px 0 rgba(168, 85, 247, 0.4),
                        inset 0 1px 0 0 rgba(255, 255, 255, 0.3);
            color: #ffffff;
        }

        /* Главная кнопка набора — ультра-глянец */
        .vip-btn {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.2) 0%, rgba(147, 51, 234, 0.05) 100%);
            border-color: rgba(168, 85, 247, 0.5);
        }
    </style>
</head>
<body>

    <!-- Твоя новая сочнейшая аватарка века с пляжем (просто назови файл avatar.png в этой же папке) -->
    <img class="profile-img" src="avatar.jpg" alt="FDG Logo">
    

    <h1>FRONTLINE DEV-GROUP</h1>
    <div class="sub-title">Roblox Studio</div>

    <!-- Твои жидкие стеклянные кнопки управления -->
    <a class="link-btn vip-btn" href="https://forms.yandex.ru/u/6a466fef1f1eb53d07a67deb" target="_blank">🔥 СТАТЬ РАЗРАБОТЧИКОМ (Набор)</a>
    <a class="link-btn" href="https://www.tiktok.com/@frontline_games_official?_r=1&_t=ZS-97hRfzROT6G" target="_blank">🏖️ Курорт: Resort Builder (В РАЗРАБОТКЕ!🛠)</a>
    <a class="link-btn" href="https://www.tiktok.com/@frontline_games_official?_r=1&_t=ZS-97hRfzROT6G" target="_blank">💬 Официальный Discord (💎Штаб FDG🔱) </a>

</body>
</html>
